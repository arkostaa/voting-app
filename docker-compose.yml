version: '3.8'
services:
  service_a:
    build: ./service_a
    environment:
      - OTEL_SERVICE_NAME=voting-frontend
      - OTEL_TRACES_EXPORTER=otlp
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4317
      # --- НАСТРОЙКИ ОПРОСА ---
      - POLL_TITLE=Cats vs Dogs
      - OPTION_A=Cats
      - OPTION_B=Dogs
    depends_on:
      - jaeger
      - service_b

  service_b:
    build: ./service_b
    environment:
      - OTEL_SERVICE_NAME=voting-backend
      - OTEL_TRACES_EXPORTER=otlp
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4317
      - OPTION_A=Cats
      - OPTION_B=Dogs
    depends_on:
      - jaeger
      - redis

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
  jaeger:
    image: jaegertracing/all-in-one:latest
    ports:
      - "16686:16686"
      - "4317:4317"

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin # Пароль от админки

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
    - service_a